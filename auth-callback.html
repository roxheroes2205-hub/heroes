<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HEROES — Authenticating...</title>
<link rel="stylesheet" href="theme.css" />
<script src="theme-toggle.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .auth-container {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px 48px; text-align: center;
    max-width: 420px; width: 90vw;
  }
  .auth-container h2 { margin-bottom: 12px; font-size: 1.2rem; }
  .auth-container p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }

  .spinner {
    width: 36px; height: 36px; margin: 0 auto 20px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-icon { font-size: 2.2rem; margin-bottom: 12px; }

  .btn-discord {
    background: #5865F2; color: #fff; padding: 12px 28px; border-radius: 8px;
    border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600;
    display: inline-flex; align-items: center; gap: 10px;
    transition: background 0.15s;
  }
  .btn-discord:hover { background: #4752C4; }
  .btn-discord svg { width: 20px; height: 20px; fill: currentColor; }

  .back-link { color: var(--text-muted); font-size: 0.82rem; margin-top: 16px; display: inline-block; }
  .back-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="auth-container">
  <div class="spinner" id="loading-spinner"></div>
  <h2 id="status-title">Authenticating...</h2>
  <p id="status-message">Verifying your Discord identity and guild membership.</p>
  <div id="status-actions" style="display:none"></div>
</div>

<script type="module">
import {
  parseCallbackFragment, storeSession, clearSession,
  fetchUser, fetchGuildMember, hasRequiredRole, buildAuthUrl
} from './discord-auth.js';

(async function handleCallback() {
  const titleEl   = document.getElementById('status-title');
  const msgEl     = document.getElementById('status-message');
  const actionsEl = document.getElementById('status-actions');
  const spinnerEl = document.getElementById('loading-spinner');

  // Parse the fragment
  const params = parseCallbackFragment();
  if (!params) {
    showError('Authentication Failed',
      'No access token received from Discord. Please try again.');
    return;
  }

  const { accessToken, expiresIn, state } = params;
  const returnPath = state || 'index.html';

  try {
    // Fetch user identity
    const user = await fetchUser(accessToken);
    if (!user) {
      showError('Authentication Failed',
        'Could not verify your Discord identity. The token may be invalid.');
      return;
    }

    // Store session temporarily (needed to check guild member)
    storeSession(accessToken, expiresIn, user);

    // Check guild membership
    const member = await fetchGuildMember(accessToken);
    if (!member) {
      clearSession();
      showError('Not a Guild Member',
        'You are not a member of the HEROES Discord server. Please join the server first, then try again.');
      return;
    }

    // Check role
    if (!hasRequiredRole(member)) {
      clearSession();
      showError('Missing Required Role',
        'Your Discord account does not have the required role to access this site. Contact a guild officer if you believe this is an error.');
      return;
    }

    // Success — redirect to original page
    // Clear the hash to avoid token leaking in browser history
    window.location.replace(returnPath);

  } catch (err) {
    clearSession();
    showError('Verification Error',
      'Could not connect to Discord to verify your membership. Please check your internet connection and try again.');
  }

  function showError(title, message) {
    spinnerEl.style.display = 'none';
    titleEl.textContent = title;
    msgEl.textContent = message;
    actionsEl.style.display = '';
    actionsEl.innerHTML = `
      <button class="btn-discord" onclick="window.location.href='${buildAuthUrl(returnPath || 'index.html').replace(/'/g, "\\'")}'"">
        <svg viewBox="0 0 71 55"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.2a58.9 58.9 0 0017.7 9 .2.2 0 00.3-.1 42.1 42.1 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.6-2.7.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.6 2.7.2.2 0 00-.1.3 47.3 47.3 0 003.6 5.9.2.2 0 00.3.1A58.7 58.7 0 0070.5 45.7v-.2c1.4-15-2.3-28-9.8-39.6a.2.2 0 00-.1-.1zM23.7 37.3c-3.4 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.1 6.3 7-2.8 7-6.3 7zm23.2 0c-3.4 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.1 6.3 7-2.8 7-6.3 7z" fill="currentColor"/></svg>
        Try Again
      </button>
      <br>
      <a href="index.html" class="back-link">Return to Home</a>
    `;
  }
})();
</script>
</body>
</html>
